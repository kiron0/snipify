name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_e2e:
        description: Run the live network/browser screenshot E2E test
        required: false
        default: false
        type: boolean

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        node:
          - 18
          - 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        run: npm test

      - name: Run built CLI smoke test
        run: npm run test:smoke

      - name: Run tarball install smoke test
        run: npm run test:pack

  live-e2e:
    name: Live E2E
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_e2e }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build CLI
        run: npm run build

      - name: Run live E2E test
        run: npm run test:e2e:live
        env:
          SNIPIFY_RUN_LIVE_E2E: "1"
